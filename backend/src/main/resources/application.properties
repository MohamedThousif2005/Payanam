# Server Configuration
server.port=8090
server.servlet.context-path=/

# Database Configuration - MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/payanam_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=MYSQL@Thousif#2005
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration - MySQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Disable SQL initialization
spring.sql.init.mode=never
spring.jpa.generate-ddl=true

# CORS Configuration
spring.web.cors.allowed-origins=http://localhost:5173,http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Logging
logging.level.com.payanam=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Enable scheduling
spring.task.scheduling.enabled=true